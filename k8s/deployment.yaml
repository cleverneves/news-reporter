apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15.3-alpine
          env:
            - name: POSTGRES_DB
              value: "news_reporter"
            - name: POSTGRES_USER
              value: "newsreporteruser"
            - name: POSTGRES_PASSWORD
              value: "Nr#12345"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-reporter
spec:
  replicas: 3
  selector:
    matchLabels:
      app: news-reporter
  template:
    metadata:
      labels:
        app: news-reporter
    spec:
      containers:
        - name: news-reporter
          image: cleversonneves/news-reporter:1.0.0
          env:
            - name: DB_HOST
              value: "postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "news_reporter"
            - name: DB_USER
              value: "newsreporteruser"
            - name: DB_PASSWORD
              value: "Nr#12345"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: news-reporter
spec:
  selector:
    app: news-reporter
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30000
  type: NodePort
