apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15.3-alpine
          env:
            - name: POSTGRES_DB
              value: "news_reporter"
            - name: POSTGRES_USER
              value: "newsreporteruser"
            - name: POSTGRES_PASSWORD
              value: "Nr#12345"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
